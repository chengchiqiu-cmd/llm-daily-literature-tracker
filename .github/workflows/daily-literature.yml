name: Daily LLM literature tracker

on:
  schedule:
    # 08:00 Asia/Shanghai every day. GitHub Actions cron uses UTC.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-llm-literature
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF text extraction dependency
        run: python -m pip install pypdf

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Collect and build report
        env:
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_ANALYSIS_MODEL: ${{ vars.OPENAI_ANALYSIS_MODEL || 'gpt-5.6-luna' }}
        run: python scripts/track_literature.py

      - name: Commit the daily report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports site data/paper_analysis_zh.json data/confirmed_papers.json
          if git diff --cached --quiet; then
            echo "No report changes"
          else
            git commit -m "chore: update daily LLM literature report"
            git push
          fi
