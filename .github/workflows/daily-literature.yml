name: Daily LLM literature tracker

on:
  schedule:
    # Primary run at 05:10 Asia/Shanghai. Backups run at 05:40 and 06:10.
    # GitHub Actions cron uses UTC, so these times are on the previous UTC day.
    - cron: "10 21 * * *"
    - cron: "40 21 * * *"
    - cron: "10 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-llm-literature
  cancel-in-progress: false

jobs:
  check:
    name: Check whether today's report is needed
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.report.outputs.should_run }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check today's report
        id: report
        shell: bash
        run: |
          report_date="$(TZ=Asia/Shanghai date +%F)"
          report_path="site/literature_tracking_${report_date}.html"
          if [[ "${{ github.event_name }}" == "schedule" && -f "$report_path" ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Today's report already exists; skipping duplicate scheduled run: $report_path"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  collect:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF text extraction dependency
        run: python -m pip install pypdf

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Collect and build report
        env:
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_ANALYSIS_MODEL: ${{ vars.OPENAI_ANALYSIS_MODEL || 'gpt-5.6-luna' }}
        run: python scripts/track_literature.py

      - name: Commit the daily report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports site data/paper_analysis_zh.json data/confirmed_papers.json
          if git diff --cached --quiet; then
            echo "No report changes"
          else
            git commit -m "chore: update daily LLM literature report"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
